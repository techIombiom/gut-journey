<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Gut Persona — iom Bioworks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  #screen-level4 { background: #0d1f3c; min-height: 100vh; }
  .l4-text { font-family:'Cormorant Garamond',serif; color:white; text-align:center; font-style:italic; }
  @keyframes cardReveal { 0%{transform:scale(0.4) translateY(40px);opacity:0;} 100%{transform:scale(1) translateY(0);opacity:1;} }
  .card-reveal { animation: cardReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  #screen-level4.active { display:flex; flex-direction:column; min-height:100vh; }
  #l4-canvas-wrap { position:relative; flex:1; min-height:0; overflow:hidden; }
  #l4-canvas { display:block; width:100%; height:100%; touch-action:none; }
  .share-loading { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="gut-app">

  <div id="screen-level4" class="screen active">
    <div class="runner-header" style="background:#0d1f3c;flex-shrink:0;">
      <div class="runner-label">Your gut — fully unlocked</div>
      <div class="orb-count" id="l4-orb-count">&#x26A1; 0 / 50</div>
    </div>
    <div style="background:#0d1f3c;padding:0 18px 10px;flex-shrink:0;">
      <div class="timer-bar-wrap" style="background:#0d1f3c;">
        <div class="timer-bar-fill" id="l4-timer" style="width:100%;"></div>
      </div>
    </div>
    <div id="l4-canvas-wrap">
      <canvas id="l4-canvas"></canvas>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:32px 24px;pointer-events:none;z-index:3;text-align:center;">
        <div id="l4-msg" class="l4-text" style="font-size:24px;opacity:0;transition:opacity 0.8s;max-width:280px;line-height:1.3;"></div>
      </div>
    </div>
  </div>

  <div id="screen-card" class="screen" style="background:var(--navy);overflow-y:auto;">
    <div style="padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#0d1f3c;">
      <div style="width:36px;"></div>
      <a href="https://iombio.com" target="_blank" style="line-height:0;">
        <img src="https://iombio.com/wp-content/uploads/2025/11/IOM_WHITE.png" alt="iom Bioworks" style="height:26px;width:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"><span style="display:none;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);">iom Bioworks</span>
      </a>
      <button class="mute-btn" id="mute-btn" style="color:white;opacity:0.5;">🔊</button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:0 20px 36px;">
      <div id="persona-card-wrap" style="opacity:0;width:100%;max-width:320px;margin-bottom:24px;"></div>
      <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;">
        <button class="btn-wa" id="btn-wa">&#x1F4AC; Share on WhatsApp</button>
        <button class="btn-ig" id="btn-ig">&#x1F4F8; Share on Instagram</button>
        <button class="btn-primary" onclick="window.location.href='recommend.html'" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);">What does my gut actually need? &#x2192;</button>
        <button class="btn-secondary" onclick="restartGame()" style="background:transparent;color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.15);font-size:13px;padding:12px;">Retake the Journey &#x1F504;</button>
      </div>
    </div>
    <div style="background:#0d1f3c;border-top:1px solid rgba(255,255,255,0.06);padding:20px;text-align:center;flex-shrink:0;">
      <a href="https://iombio.com" target="_blank" style="display:inline-block;line-height:0;margin-bottom:10px;">
        <img src="https://iombio.com/wp-content/uploads/2025/11/IOM_WHITE.png" alt="iom Bioworks" style="height:20px;width:auto;opacity:0.6;" onerror="this.style.display='none';">
      </a>
      <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:8px;">Gut health &amp; microbiome science · Made in India</p>
      <div style="display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:8px;">
        <a href="https://iombio.com/shop" target="_blank" style="font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;">Shop</a>
        <a href="https://iombio.com/gut-microbiome-tests" target="_blank" style="font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;">Gut Tests</a>
        <a href="https://iombio.com/about" target="_blank" style="font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;">About</a>
        <a href="https://iombio.com/privacy-policy" target="_blank" style="font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;">Privacy</a>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,0.15);">&copy; 2026 iom Bioworks</p>
    </div>
  </div>

</div>
<div id="toast" class="toast"></div>

<script src="js/state.js"></script>
<script src="js/constants.js"></script>
<script src="js/scoring.js"></script>
<script>
const s = GS.get();
if (!s.name || !s.personaKey) window.location.href = 'index.html';

GS.save({ levels_reached: 4 });

function renderCardScreenComponents() { /* hardcoded in HTML */ }

function goTo(id) {
  document.querySelectorAll('.screen').forEach(sc => {
    if (sc.classList.contains('active')) {
      sc.classList.remove('active');
      sc.classList.add('exit');
      setTimeout(() => sc.classList.remove('exit'), 400);
    }
  });
  setTimeout(() => { const el = document.getElementById('screen-' + id); if (el) el.classList.add('active'); }, 60);
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), duration || 3200);
}

function restartGame() { GS.clear(); window.location.href = 'index.html'; }

function buildCardUrl() {
  const base = window.location.origin + '/card.html';
  const p = new URLSearchParams({
    p:  s.personaKey   || '',
    s:  s.finalScore   || 0,
    n:  encodeURIComponent(s.name || ''),
    f:  s.fiberLevel   || 0,
    st: s.stressIndex  || 0,
    d:  s.gutDiversity || 0
  });
  return base + '?' + p.toString();
}

/* ── Level 4 Cinematic ── */
(function runL4() {
  const canvas = document.getElementById('l4-canvas');
  const wrap   = document.getElementById('l4-canvas-wrap');
  const appEl  = document.getElementById('gut-app');

  function sizeCanvas() {
    const r = wrap.getBoundingClientRect();
    const W = Math.round(r.width)  || 375;
    const H = Math.round(r.height) || (window.innerHeight - 65) || 500;
    canvas.width  = W;
    canvas.height = Math.max(H, 300);
    return { W: canvas.width, H: canvas.height };
  }

  requestAnimationFrame(function() { requestAnimationFrame(function startCinematic() {
    const { W, H } = sizeCanvas();
    const ctx = canvas.getContext('2d');
    const TOTAL = 50, DURATION = 10000;
    const ZONES = [H*0.22, H*0.5, H*0.78];
    let collected=0, orbs=[], popups=[], orbsSpawned=0, lastSpawn=null, startTime=null, rafId=null;
    const RUNNER_X = W*0.13;
    const RUNNER_EMOJI = GS.val('avatar','male')==='female'?'\uD83D\uDEB6\u200D\u2640\uFE0F':'\uD83D\uDEB6';
    const msgs = [
      { time:2000, text:'This is your gut \u2014 fully optimised' },
      { time:5000, text:'Gut Test + Prebiotics.\nNothing left uncaptured.' },
      { time:8000, text:(s.name||'You')+', meet your\nGut Persona \uD83C\uDFB4' }
    ];
    const msgShown=[];

    function frame(now) {
      if (!startTime) { startTime=now; lastSpawn=now; }
      const elapsed=now-startTime, progress=Math.min(elapsed/DURATION,1);
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#0a1528'; ctx.fillRect(0,0,W,H);
      for (let i=0;i<W;i+=4) { const a=0.04+0.03*Math.sin(i*0.05+elapsed*0.002); ctx.fillStyle='rgba(76,175,80,'+a+')'; ctx.fillRect(i,0,2,H); }
      if (now-lastSpawn>200&&orbsSpawned<TOTAL) { orbs.push({x:W+10,y:ZONES[Math.floor(Math.random()*3)]}); orbsSpawned++; lastSpawn=now; }
      const runnerY=ZONES[1]+(H*0.2)*Math.sin(elapsed*0.003);
      orbs=orbs.filter(orb=>{
        orb.x-=200/60;
        const dx=(RUNNER_X+14)-orb.x,dy=runnerY-orb.y;
        if (Math.sqrt(dx*dx+dy*dy)<26) { collected++; document.getElementById('l4-orb-count').textContent='\u26A1 '+collected+' / 50'; popups.push({x:orb.x,y:orb.y-16,text:'\u2728',age:0,life:30}); return false; }
        if (orb.x<-20) return false;
        ctx.fillStyle='#FFD700'; ctx.globalAlpha=0.92; ctx.beginPath(); ctx.arc(orb.x,orb.y,12,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(255,215,0,0.3)'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(orb.x,orb.y,18,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
        return true;
      });
      ctx.globalAlpha=1; ctx.shadowColor='rgba(255,255,255,0.9)'; ctx.shadowBlur=14; ctx.font='26px serif'; ctx.textBaseline='middle'; ctx.textAlign='left'; ctx.fillText(RUNNER_EMOJI,RUNNER_X-2,runnerY); ctx.shadowBlur=0;
      popups=popups.filter(p=>{ p.age++; ctx.globalAlpha=Math.max(0,1-p.age/p.life); ctx.font='18px serif'; ctx.textAlign='center'; ctx.fillText(p.text,p.x,p.y-p.age*0.5); ctx.globalAlpha=1; return p.age<p.life; });
      ctx.textAlign='left';
      document.getElementById('l4-timer').style.width=Math.round((1-progress)*100)+'%';
      const msgEl=document.getElementById('l4-msg');
      msgs.forEach(m=>{ if (elapsed>m.time&&!msgShown.includes(m.time)) { msgShown.push(m.time); msgEl.style.opacity='0'; setTimeout(()=>{msgEl.textContent=m.text;msgEl.style.opacity='1';},300); setTimeout(()=>{msgEl.style.opacity='0';},2000); }});
      if (progress>=1) { cancelAnimationFrame(rafId); setTimeout(showCard,600); return; }
      rafId=requestAnimationFrame(frame);
    }
    rafId=requestAnimationFrame(frame);
  }); }); // double rAF ensures layout complete
})();

/* ── Card Reveal ── */
function showCard() {
  goTo('card');
  setTimeout(renderCardScreenComponents, 100);
  setTimeout(() => {
    const persona = PERSONAS[s.personaKey];
    if (!persona) return;
    const g1=persona.gradient[0], g2=persona.gradient[1];
    const wrap=document.getElementById('persona-card-wrap');
    wrap.innerHTML = `
      <div class="persona-card card-reveal" id="persona-card">
        <div class="persona-card-header" style="background:linear-gradient(135deg,${g1},${g2});">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;margin-bottom:14px;">
            <div style="font-size:10px;color:rgba(255,255,255,0.65);font-weight:500;letter-spacing:0.12em;text-transform:uppercase;">iom Bioworks</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.55);">Gut Persona</div>
          </div>
          <div style="font-size:54px;margin-bottom:10px;">${persona.emoji}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:white;font-weight:600;margin-bottom:4px;">${persona.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);">${s.name}'s Gut Profile</div>
        </div>
        <div class="persona-card-body">
          <div style="text-align:center;margin-bottom:18px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Gut Score</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:60px;color:var(--pink);font-weight:600;line-height:1;" id="score-display">0</div>
            <div style="font-size:12px;color:var(--muted);">out of 100</div>
          </div>
          <div>
            <div class="stat-bar-row"><div class="stat-bar-label">Fiber</div><div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-fiber"></div></div><div class="stat-bar-val" id="val-fiber">0</div></div>
            <div class="stat-bar-row"><div class="stat-bar-label">Stress</div><div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-stress" style="background:var(--pink);"></div></div><div class="stat-bar-val" id="val-stress">0</div></div>
            <div class="stat-bar-row" style="margin-bottom:0;"><div class="stat-bar-label">Diversity</div><div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-div"></div></div><div class="stat-bar-val" id="val-div">0</div></div>
          </div>
        </div>
        <div class="persona-card-footer">
          <p style="font-size:13px;color:var(--navy);line-height:1.6;margin-bottom:5px;font-weight:500;">${persona.line1}</p>
          <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;">${persona.line2}</p>
          <a href="https://iombio.com" target="_blank" style="font-size:11px;color:var(--pink);font-weight:500;text-decoration:none;">iombio.com &#x2197;</a>
        </div>
      </div>`;
    wrap.style.opacity='1';
    let n=0; const scoreEl=document.getElementById('score-display');
    const iv=setInterval(()=>{ n=Math.min(n+2,s.finalScore||0); if(scoreEl) scoreEl.textContent=n; if(n>=(s.finalScore||0)) clearInterval(iv); },28);
    setTimeout(()=>{
      document.getElementById('bar-fiber').style.width=(s.fiberLevel||0)+'%'; document.getElementById('val-fiber').textContent=s.fiberLevel||0;
      document.getElementById('bar-stress').style.width=(s.stressIndex||0)+'%'; document.getElementById('val-stress').textContent=s.stressIndex||0;
      document.getElementById('bar-div').style.width=(s.gutDiversity||0)+'%'; document.getElementById('val-div').textContent=s.gutDiversity||0;
    },700);
    fireWebhook();
  }, 450);
}

/* ── Image capture helper ── */
function captureCard() {
  return new Promise((resolve, reject) => {
    const card = document.getElementById('persona-card');
    if (!card || typeof html2canvas === 'undefined') { reject(new Error('Not ready')); return; }
    html2canvas(card, { scale:2, useCORS:true, allowTaint:true, backgroundColor:null, logging:false })
      .then(canvas => canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/png'))
      .catch(reject);
  });
}

function setButtonLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) { btn.dataset.orig = btn.innerHTML; btn.innerHTML = '<span class="share-loading"></span>Preparing...'; btn.disabled=true; }
  else { btn.innerHTML = btn.dataset.orig || btn.innerHTML; btn.disabled=false; }
}

/* ── WhatsApp Share — rich card link + image ── */
document.getElementById('btn-wa').addEventListener('click', async () => {
  const persona = PERSONAS[s.personaKey];
  const cardUrl = buildCardUrl();
  const shareText =
    'I just discovered I am a ' + persona.name + '\n' +
    'My Gut Score is ' + (s.finalScore||0) + '/100.\n\n' +
    persona.line1 + '\n\n' +
    'See my Gut Persona card ->\n' + cardUrl + '\n\n' +
    '#GutJourney #iomBioworks';

  if (navigator.share && navigator.canShare) {
    setButtonLoading('btn-wa', true);
    try {
      const blob = await captureCard();
      const file = new File([blob], 'my-gut-persona.png', { type:'image/png' });
      const shareData = { files:[file], text:shareText };
      if (navigator.canShare(shareData)) { await navigator.share(shareData); setButtonLoading('btn-wa', false); return; }
    } catch(e) { /* fall through */ }
    setButtonLoading('btn-wa', false);
  }
  window.open('https://wa.me/?text=' + encodeURIComponent(shareText), '_blank');
});

/* ── Instagram Share — download image ── */
document.getElementById('btn-ig').addEventListener('click', async () => {
  setButtonLoading('btn-ig', true);
  try {
    const blob = await captureCard();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='my-gut-persona-'+(s.personaKey||'card')+'.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    showToast('Card saved! Open Instagram -> Stories -> add image', 4000);
  } catch(e) { showToast('Screenshot the card and share to Instagram Stories!', 3500); }
  setButtonLoading('btn-ig', false);
});

/* ── Make.com Webhook ── */
function fireWebhook() {
  const savedState = GS.get();
  const channel = savedState.channel || new URLSearchParams(window.location.search).get('utm_source') || 'direct';
  const cardUrl = buildCardUrl();
  const payload = {
    player_name:          s.name,
    whatsapp_number:      s.whatsapp_number || '',
    timestamp:            new Date().toISOString(),
    channel:              channel,
    avatar:               s.avatar,
    goal_chosen:          s.goal,
    choice_morning:       s.choice_morning,
    choice_lunch_base:    s.lunch_base,
    choice_lunch_protein: s.lunch_protein,
    choice_lunch_veg:     s.lunch_veg,
    choice_lunch_side:    s.lunch_side,
    choice_afternoon:     s.choice_afternoon,
    choice_dinner:        s.choice_dinner,
    morning_score:        s.morning_score    || 0,
    lunch_score:          s.lunch_score      || 0,
    afternoon_score:      s.afternoon_score  || 0,
    dinner_score:         s.dinner_score     || 0,
    runner1_collected:    s.runner1_collected || 0,
    runner2_collected:    s.runner2_collected || 0,
    runner3_collected:    s.runner3_collected || 0,
    behavioural_score:    s.behavioural      || 0,
    runner_score:         s.runnerScore      || 0,
    final_score:          s.finalScore       || 0,
    persona:              s.personaKey,
    boss:                 s.boss,
    levels_reached:       s.levels_reached   || 4,
    game_completed:       true,
    card_url:             cardUrl
  };
  const webhookUrl = 'https://hook.eu1.make.com/PLACEHOLDER_REPLACE_WITH_REAL_URL';
  fetch(webhookUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).catch(()=>{});
}
</script>
</body>
</html>
