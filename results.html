<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Gut Persona — iom Bioworks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  #screen-level4 { background: #0d1f3c; min-height: 100vh; }
  .l4-text { font-family:'Cormorant Garamond',serif; color:white; text-align:center; font-style:italic; }

  @keyframes cardReveal {
    0%  { transform:scale(0.4) translateY(40px); opacity:0; }
    100%{ transform:scale(1)   translateY(0);    opacity:1; }
  }
  .card-reveal { animation: cardReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  /* Level 4 runner fills full remaining height */
  #screen-level4.active {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  #l4-canvas-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #l4-canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
</style>
</head>
<body>
<div id="gut-app">

  <!-- LEVEL 4 CINEMATIC -->
  <div id="screen-level4" class="screen active">
    <div class="runner-header" style="background:#0d1f3c;flex-shrink:0;">
      <div class="runner-label">Your gut — fully unlocked 🌿</div>
      <div class="orb-count" id="l4-orb-count">⚡ 0 / 50</div>
    </div>
    <div style="background:#0d1f3c;padding:0 18px 10px;flex-shrink:0;">
      <div class="timer-bar-wrap" style="background:#0d1f3c;">
        <div class="timer-bar-fill" id="l4-timer" style="width:100%;"></div>
      </div>
    </div>
    <div id="l4-canvas-wrap">
      <canvas id="l4-canvas"></canvas>
      <div id="l4-text-overlay" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:32px 24px;pointer-events:none;z-index:3;text-align:center;">
        <div id="l4-msg" class="l4-text" style="font-size:24px;opacity:0;transition:opacity 0.8s;max-width:280px;line-height:1.3;"></div>
      </div>
    </div>
  </div>

  <!-- PERSONA CARD -->
  <div id="screen-card" class="screen" style="background:var(--navy);overflow-y:auto;">
    <div style="padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
      <div class="logo-text" style="color:rgba(255,255,255,0.5);">iom Bioworks</div>
      <button class="mute-btn" style="color:white;opacity:0.5;">🔊</button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:0 20px 36px;">
      <div id="persona-card-wrap" style="opacity:0;width:100%;max-width:320px;margin-bottom:24px;"></div>
      <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;">
        <button class="btn-wa"  id="btn-wa">💬 Share on WhatsApp</button>
        <button class="btn-ig"  id="btn-ig">📸 Share on Instagram</button>
        <button class="btn-primary" onclick="window.location.href='recommend.html'"
          style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);">
          What does my gut actually need? →
        </button>
        <button class="btn-secondary" onclick="restartGame()"
          style="background:transparent;color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.15);font-size:13px;padding:12px;">
          Retake the Journey 🔄
        </button>
      </div>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="js/state.js"></script>
<script src="js/constants.js"></script>
<script src="js/scoring.js"></script>
<script>
const s = GS.get();
if (!s.name || !s.personaKey) window.location.href = 'index.html';

/* ── Save level 4 reached ── */
GS.save({ levels_reached: 4 });

function goTo(id) {
  document.querySelectorAll('.screen').forEach(sc => {
    if (sc.classList.contains('active')) {
      sc.classList.remove('active');
      sc.classList.add('exit');
      setTimeout(() => sc.classList.remove('exit'), 400);
    }
  });
  setTimeout(() => {
    const el = document.getElementById('screen-' + id);
    if (el) el.classList.add('active');
  }, 60);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3200);
}

function restartGame() { GS.clear(); window.location.href = 'index.html'; }

/* ════════════════════════════════════════
   LEVEL 4 CINEMATIC — auto-play, no input
   ════════════════════════════════════════ */
(function runL4() {
  const canvas = document.getElementById('l4-canvas');
  const wrap   = document.getElementById('l4-canvas-wrap');
  const appEl  = document.getElementById('gut-app');

  /* Size canvas after a brief paint delay so layout is settled */
  function sizeCanvas() {
    const W = wrap.offsetWidth  || appEl.offsetWidth  || 375;
    const H = wrap.offsetHeight || (appEl.offsetHeight - 65) || 400;
    canvas.width  = W;
    canvas.height = Math.max(H, 260);
    return { W: canvas.width, H: canvas.height };
  }

  /* Small delay to ensure the screen is painted before we read heights */
  setTimeout(function startCinematic() {
    const { W, H } = sizeCanvas();
    const ctx    = canvas.getContext('2d');
    const TOTAL  = 50;
    const DURATION = 10000;
    const ZONES  = [H * 0.22, H * 0.5, H * 0.78];

    let collected = 0, orbs = [], popups = [];
    let orbsSpawned = 0, lastSpawn = null, startTime = null, rafId = null;

    const RUNNER_X     = W * 0.13;
    const RUNNER_EMOJI = GS.val('avatar', 'male') === 'female' ? '🚶‍♀️' : '🚶';

    const msgs = [
      { time: 2000, text: 'This is your gut — fully optimised' },
      { time: 5000, text: 'Gut Test + Prebiotics.\nNothing left uncaptured.' },
      { time: 8000, text: s.name + ', meet your\nGut Persona 🎴' }
    ];
    const msgShown = [];

    function frame(now) {
      if (!startTime) { startTime = now; lastSpawn = now; }
      const elapsed  = now - startTime;
      const progress = Math.min(elapsed / DURATION, 1);

      ctx.clearRect(0, 0, W, H);

      /* Background — deep green particle field */
      ctx.fillStyle = '#0a1528';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < W; i += 4) {
        const a = 0.04 + 0.03 * Math.sin(i * 0.05 + elapsed * 0.002);
        ctx.fillStyle = `rgba(76,175,80,${a})`;
        ctx.fillRect(i, 0, 2, H);
      }

      /* Spawn gold orbs rapidly */
      if (now - lastSpawn > 200 && orbsSpawned < TOTAL) {
        const zone = Math.floor(Math.random() * 3);
        orbs.push({ x: W + 10, y: ZONES[zone] });
        orbsSpawned++; lastSpawn = now;
      }

      /* Runner auto-weaves between zones */
      const runnerY = ZONES[1] + (H * 0.2) * Math.sin(elapsed * 0.003);

      /* Update & draw orbs */
      orbs = orbs.filter(orb => {
        orb.x -= 200 / 60;
        const dx = (RUNNER_X + 14) - orb.x;
        const dy = runnerY - orb.y;
        if (Math.sqrt(dx * dx + dy * dy) < 26) {
          collected++;
          document.getElementById('l4-orb-count').textContent = '⚡ ' + collected + ' / 50';
          popups.push({ x: orb.x, y: orb.y - 16, text: '✨', age: 0, life: 30 });
          return false;
        }
        if (orb.x < -20) return false;

        /* Gold orb */
        ctx.fillStyle = '#FFD700'; ctx.globalAlpha = 0.92;
        ctx.beginPath(); ctx.arc(orb.x, orb.y, 12, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.arc(orb.x, orb.y, 18, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
        return true;
      });

      /* Draw runner — glowing */
      ctx.globalAlpha = 1;
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur  = 14;
      ctx.font = '26px serif'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      ctx.fillText(RUNNER_EMOJI, RUNNER_X - 2, runnerY);
      ctx.shadowBlur = 0;

      /* Draw popups */
      popups = popups.filter(p => {
        p.age++;
        ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
        ctx.font = '18px serif'; ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y - p.age * 0.5);
        ctx.globalAlpha = 1;
        return p.age < p.life;
      });
      ctx.textAlign = 'left';

      /* Timer bar */
      document.getElementById('l4-timer').style.width =
        Math.round((1 - progress) * 100) + '%';

      /* Timed messages */
      const msgEl = document.getElementById('l4-msg');
      msgs.forEach(m => {
        if (elapsed > m.time && !msgShown.includes(m.time)) {
          msgShown.push(m.time);
          msgEl.style.opacity = '0';
          setTimeout(() => {
            msgEl.textContent = m.text;
            msgEl.style.opacity = '1';
          }, 300);
          setTimeout(() => { msgEl.style.opacity = '0'; }, 2000);
        }
      });

      if (progress >= 1) {
        cancelAnimationFrame(rafId);
        setTimeout(showCard, 600);
        return;
      }
      rafId = requestAnimationFrame(frame);
    }

    rafId = requestAnimationFrame(frame);
  }, 120); /* 120ms paint delay */
})();

/* ════════════════════════════════════════
   PERSONA CARD REVEAL
   ════════════════════════════════════════ */
function showCard() {
  goTo('card');

  setTimeout(() => {
    const persona = PERSONAS[s.personaKey];
    if (!persona) { console.error('No persona for key:', s.personaKey); return; }

    const g1 = persona.gradient[0];
    const g2 = persona.gradient[1];
    const wrap = document.getElementById('persona-card-wrap');

    wrap.innerHTML = `
      <div class="persona-card card-reveal" id="persona-card">
        <div class="persona-card-header" style="background:linear-gradient(135deg,${g1},${g2});">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;margin-bottom:14px;">
            <div style="font-size:10px;color:rgba(255,255,255,0.65);font-weight:500;letter-spacing:0.12em;text-transform:uppercase;">iom Bioworks</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.06em;">Gut Persona</div>
          </div>
          <div style="font-size:54px;margin-bottom:10px;">${persona.emoji}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:white;font-weight:600;margin-bottom:4px;">${persona.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);">${s.name}'s Gut Profile</div>
        </div>

        <div class="persona-card-body">
          <div style="text-align:center;margin-bottom:18px;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Gut Score</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:60px;color:var(--pink);font-weight:600;line-height:1;" id="score-display">0</div>
            <div style="font-size:12px;color:var(--muted);">out of 100</div>
          </div>
          <div>
            <div class="stat-bar-row">
              <div class="stat-bar-label">Fiber</div>
              <div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-fiber"></div></div>
              <div class="stat-bar-val" id="val-fiber">0</div>
            </div>
            <div class="stat-bar-row">
              <div class="stat-bar-label">Stress</div>
              <div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-stress" style="background:var(--pink);"></div></div>
              <div class="stat-bar-val" id="val-stress">0</div>
            </div>
            <div class="stat-bar-row" style="margin-bottom:0;">
              <div class="stat-bar-label">Diversity</div>
              <div class="stat-bar-wrap"><div class="stat-bar-fill" id="bar-div"></div></div>
              <div class="stat-bar-val" id="val-div">0</div>
            </div>
          </div>
        </div>

        <div class="persona-card-footer">
          <p style="font-size:13px;color:var(--navy);line-height:1.6;margin-bottom:5px;font-weight:500;">${persona.line1}</p>
          <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;">${persona.line2}</p>
          <div style="font-size:11px;color:var(--pink);font-weight:500;">iombio.com</div>
        </div>
      </div>`;

    wrap.style.opacity = '1';

    /* Animate score counter */
    let n = 0;
    const scoreEl = document.getElementById('score-display');
    const iv = setInterval(() => {
      n = Math.min(n + 2, s.finalScore || 0);
      if (scoreEl) scoreEl.textContent = n;
      if (n >= (s.finalScore || 0)) clearInterval(iv);
    }, 28);

    /* Animate stat bars */
    setTimeout(() => {
      const fiber  = s.fiberLevel    || 0;
      const stress = s.stressIndex   || 0;
      const divers = s.gutDiversity  || 0;

      document.getElementById('bar-fiber').style.width  = fiber  + '%';
      document.getElementById('val-fiber').textContent  = fiber;
      document.getElementById('bar-stress').style.width = stress + '%';
      document.getElementById('val-stress').textContent = stress;
      document.getElementById('bar-div').style.width    = divers + '%';
      document.getElementById('val-div').textContent    = divers;
    }, 700);

    fireWebhook();
  }, 450);
}

/* ════════════════════════════════════════
   SHARE BUTTONS
   ════════════════════════════════════════ */
document.getElementById('btn-wa').addEventListener('click', () => {
  const persona = PERSONAS[s.personaKey];
  const gameUrl = window.location.origin;
  const msg = encodeURIComponent(
    `I just discovered I'm a ${persona.name} 🎴\n` +
    `My Gut Score is ${s.finalScore}/100.\n\n` +
    `${persona.line1}\n\n` +
    `Find out your Gut Persona →\n${gameUrl}\n\n` +
    `#GutJourney #iomBioworks`
  );
  window.open('https://wa.me/?text=' + msg, '_blank');
});

document.getElementById('btn-ig').addEventListener('click', () => {
  showToast('📸 Screenshot your card and share to Instagram Stories!');
});

/* ════════════════════════════════════════
   MAKE.COM WEBHOOK — fires once on card reveal
   Includes: all choices, scores, persona,
   levels_reached, and drop-off tracking
   ════════════════════════════════════════ */
function fireWebhook() {
  const channel = new URLSearchParams(window.location.search).get('utm_source') || 'direct';

  const payload = {
    /* Identity */
    player_name:        s.name,
    timestamp:          new Date().toISOString(),
    channel:            channel,
    avatar:             s.avatar,

    /* Choices */
    goal_chosen:        s.goal,
    choice_morning:     s.choice_morning,
    choice_lunch_base:  s.lunch_base,
    choice_lunch_protein: s.lunch_protein,
    choice_lunch_veg:   s.lunch_veg,
    choice_lunch_side:  s.lunch_side,
    choice_afternoon:   s.choice_afternoon,
    choice_dinner:      s.choice_dinner,

    /* Scores */
    morning_score:      s.morning_score    || 0,
    lunch_score:        s.lunch_score      || 0,
    afternoon_score:    s.afternoon_score  || 0,
    dinner_score:       s.dinner_score     || 0,

    /* Runner */
    runner1_collected:  s.runner1_collected || 0,
    runner2_collected:  s.runner2_collected || 0,
    runner3_collected:  s.runner3_collected || 0,

    /* Final */
    behavioural_score:  s.behavioural      || 0,
    runner_score:       s.runnerScore      || 0,
    final_score:        s.finalScore       || 0,
    persona:            s.personaKey,
    boss:               s.boss,

    /* Funnel tracking — key field for Google Sheet drop-off analysis */
    levels_reached:     s.levels_reached   || 4,
    game_completed:     true
  };

  /* Replace PLACEHOLDER with your real Make.com webhook URL */
  const webhookUrl = 'https://hook.eu1.make.com/PLACEHOLDER_REPLACE_WITH_REAL_URL';

  fetch(webhookUrl, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload)
  }).catch(() => { /* fail silently — don't block the user */ });
}
</script>
</body>
</html>
